<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title | escape }} - {{ site.title | escape }}{% else %}{{ site.title | escape }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace | truncate: 160 | escape }}">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">
    <link rel="stylesheet" href="{{ '/assets/css/dropdown.css' | relative_url }}?v={{ site.time | date: '%s' }}">

    <!-- Favicons & Manifest -->
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/images/logo.svg' | relative_url }}">
    <link rel="alternate icon" type="image/png" href="{{ '/assets/images/favicon.png' | relative_url }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
    <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
    <meta name="theme-color" content="#0f172a">

    <!-- Open Graph & Twitter -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{{ page.title | default: site.title }}">
    <meta property="og:description" content="{{ page.description | default: site.description }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
    <meta property="og:image" content="{{ '/assets/images/social-card.png' | absolute_url }}">
    <meta property="og:site_name" content="{{ site.title }}">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{ page.title | default: site.title }}">
    <meta name="twitter:description" content="{{ page.description | default: site.description }}">
    <meta name="twitter:image" content="{{ '/assets/images/social-card.png' | absolute_url }}">

    {% seo %}
    {% feed_meta %}

    <!-- JSON-LD Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "{{ site.title | escape }}",
      "url": "{{ site.url | append: site.baseurl }}",
      "logo": "{{ '/assets/images/logo.png' | absolute_url }}",
      "sameAs": [
        {% if site.social.linkedin %}"https://linkedin.com/in/{{ site.social.linkedin }}"{% endif %}
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "email": "{{ site.contact.email }}",
        "areaServed": "Global",
        "availableLanguage": ["en", "vi"]
      }
    }
    </script>
    {% if page.layout == 'post' %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Article",
      "headline": "{{ page.title | escape }}",
      "description": "{{ page.description | default: page.excerpt | strip_html | strip_newlines | truncate: 160 | escape }}",
      "datePublished": "{{ page.date | date_to_xmlschema }}",
      "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
      "author": {
        "@type": "Person",
        "name": "{{ site.author.name | escape }}"
      },
      "publisher": {
        "@type": "Organization",
        "name": "{{ site.title | escape }}",
        "logo": {
          "@type": "ImageObject",
          "url": "{{ '/assets/images/logo.png' | absolute_url }}"
        }
      },
      "mainEntityOfPage": {
        "@type": "WebPage",
        "@id": "{{ page.url | absolute_url }}"
      }
    }
    </script>
    {% endif %}
</head>
<body class="{{ page.layout | default: 'default' }}">
    <!-- Skip to content link for accessibility -->
    <a class="skip-to-content" href="#main-content">Skip to main content</a>
    
    <!-- Header -->
    {% include header.html %}

    <!-- Main Content -->
    <main class="main-content" role="main" id="main-content">
        {{ content }}
    </main>

    <!-- Footer -->
    {% include footer.html %}

    <!-- JavaScript -->
    <script src="{{ '/assets/js/main.js' | relative_url }}?v={{ site.time | date: '%s' }}"></script>
</body>
</html>
