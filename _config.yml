# Site settings
title: "1DevOps - Professional DevOps Solutions"
description: "Expert DevOps consulting, tools, and solutions for modern development teams. Simplifying complex infrastructure with 12+ years of experience."
baseurl: ""
url: "https://1devops.io"
lang: "en"

languages:
  - code: en
    label: English
  - code: vi
    label: Tiếng Việt
default_lang: en

# Author information
author:
  name: "Le Phuong Hieu"
  title: "Senior DevOps/SRE Engineer"
  bio: "Senior DevOps/SRE Engineer with 12+ years of experience simplifying complex systems and building scalable infrastructure."
  email: "hieu@1devops.io"
  location: "Ho Chi Minh City, Vietnam"
  experience_years: "12+"
  linkedin: "lephuonghieu"
  github: "1devops"

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Sass settings
sass:
  style: compressed
  sourcemap: never

# Force include hidden directories/files
include:
  - .well-known
  - robots.txt
  - site.webmanifest

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/
  - requirements.md
  - SITE_BUGS_REPORT.md
  - SITE_FIXES_SUMMARY.md
  - README.md

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/
  tools:
    output: true
    permalink: /tools/:name/
  vulnerabilities:
    output: true
    permalink: /security/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "Le Phuong Hieu"
  - scope:
      path: ""
      type: "tools"
    values:
      layout: "tool"
  - scope:
      path: ""
      type: "vulnerabilities"
    values:
      layout: "vulnerability"
  - scope:
      path: ""
    values:
      image: "/assets/images/logo.png"

# Navigation
navigation:
  - name: "Home"
    url: "/"
  - name: "Services"
    url: "#"
    dropdown: true
    items:
      - name: "DevOps Consulting"
        url: "/services/devops-consulting/"
        description: "Expert DevOps transformation guidance"
      - name: "Infrastructure Setup"
        url: "/services/infrastructure/"
        description: "Kubernetes and cloud infrastructure"
      - name: "CI/CD Implementation"
        url: "/services/cicd/"
        description: "Automated deployment pipelines"
      - name: "Security Audits"
        url: "/services/security/"
        description: "Infrastructure security assessment"
  - name: "Resources"
    url: "#"
    dropdown: true
    items:
      - name: "Blog"
        url: "/blog/"
        description: "DevOps insights and tutorials"
      - name: "Tools"
        url: "/tools/"
        description: "Open source DevOps tools"
      - name: "Security Alerts"
        url: "/vulnerabilities/"
        description: "Latest vulnerability reports"
  - name: "About"
    url: "/about/"
  - name: "Contact"
    url: "/contact/"

# Header action buttons
header_actions:
  - name: "Get Quote"
    url: "/contact/"
    type: "primary"
    icon: "💬"
  - name: "View Tools"
    url: "/tools/"
    type: "secondary"
    icon: "🛠️"

# Social links
social:
  github: "1devops"
  linkedin: "lephuonghieu"
  email: "hieu@1devops.io"
  website: "1devops.io"

# Contact information
contact:
  email: "hieu@1devops.io"
  phone: "+84 975 669 775"
  location: "Ho Chi Minh City, Vietnam"
  availability: "Available for consulting projects"

calendly:
  url: "https://calendly.com/1devops/discovery-call"

# SEO settings
google_analytics: "G-XXXXXXXXXX"
google_site_verification: ""

# Performance settings
future: false
unpublished: false
limit_posts: 10

# Timezone
timezone: Asia/Ho_Chi_Minh 
